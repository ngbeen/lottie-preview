<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; }
    canvas { width: 100%; height: 100vh; display: block; }
    #error { display: none; font-family: sans-serif; color: #999; text-align: center; padding-top: 40vh; font-size: 14px; }
  </style>
</head>
<body>
  <canvas id="rive-canvas"></canvas>
  <div id="error">파일명을 URL에 입력해주세요<br><br>예시: ?file=animation.riv</div>
  <script src="https://unpkg.com/@rive-app/canvas@latest/rive.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');
    const bg = params.get('bg');

    if (bg) {
      document.body.style.background = bg.startsWith('#') ? bg : '#' + bg;
    }

    if (file) {
      new rive.Rive({
        src: file,
        canvas: document.getElementById('rive-canvas'),
        autoplay: true,
        onLoadError: () => {
          document.getElementById('rive-canvas').style.display = 'none';
          document.getElementById('error').style.display = 'block';
          document.getElementById('error').innerText = '파일을 불러올 수 없어요: ' + file;
        }
      });
    } else {
      document.getElementById('rive-canvas').style.display = 'none';
      document.getElementById('error').style.display = 'block';
    }
  </script>
</body>
</html>
