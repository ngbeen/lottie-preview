<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; }
    canvas { display: block; }
    #error { display: none; font-family: sans-serif; color: #999; text-align: center; padding-top: 40vh; font-size: 14px; }
  </style>
</head>
<body>
  <canvas id="rive-canvas"></canvas>
  <div id="error">파일명을 URL에 입력해주세요<br><br>예시: ?file=animation.riv</div>
  <script src="https://unpkg.com/@rive-app/canvas@latest/rive.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');
    const bg = params.get('bg');
    const artboard = params.get('artboard');
    const fitParam = params.get('fit') || 'contain';

    const fitMap = {
      contain: rive.Fit.Contain,
      cover: rive.Fit.Cover,
      fitWidth: rive.Fit.FitWidth,
      fitHeight: rive.Fit.FitHeight,
      fill: rive.Fit.Fill,
      none: rive.Fit.None
    };
    const fit = fitMap[fitParam] || rive.Fit.Contain;

    if (bg) {
      document.body.style.background = bg.startsWith('#') ? bg : '#' + bg;
    }

    const canvas = document.getElementById('rive-canvas');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    if (file) {
      const config = {
        src: file,
        canvas: canvas,
        autoplay: true,
        fit: fit,
        alignment: rive.Alignment.Center,
        onLoadError: () => {
          canvas.style.display = 'none';
          document.getElementById('error').style.display = 'block';
          document.getElementById('error').innerText = '파일을 불러올 수 없어요: ' + file;
        }
      };
      if (artboard) config.artboard = artboard;
      new rive.Rive(config);
    } else {
      canvas.style.display = 'none';
      document.getElementById('error').style.display = 'block';
    }
  </script>
</body>
</html>
